  <title>Zula CRM - Sistem Yönetimi</title>
  <script type="text/javascript">
    // URL Temizleyici: Eğer URL içinde ?p= veya çift hash (#/login#/login) varsa temizler
    (function () {
      var l = window.location;
      if (l.search || l.hash.split('#').length > 2) {
        var cleanPath = l.pathname.replace(/\/$/, '') + '/';
        var cleanHash = l.hash.split('#').pop() || 'login';
        window.history.replaceState(null, null, cleanPath + '#/' + cleanHash);
      }
    }());
  </script>
